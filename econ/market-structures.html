<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Structures Explorer — Economics Lab — DH Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

<style>

/* ===== DH LAB SHARED DESIGN SYSTEM ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FAF7F2;
  --cream-dark: #F0EBE1;
  --cream-mid: #E8E0D4;
  --green: #1B4332;
  --green-mid: #2D6A4F;
  --green-light: #52B788;
  --green-pale: #D8EFE4;
  --gold: #C9A84C;
  --gold-light: #E6C96A;
  --gold-pale: #FDF3D8;
  --ink: #1A1F2B;
  --ink-mid: rgba(26,31,43,0.65);
  --ink-light: rgba(26,31,43,0.35);
  --border: rgba(26,31,43,0.10);
  --border-green: rgba(27,67,50,0.20);
  --white: #FFFFFF;
  --font-display: 'Space Grotesk', sans-serif;
  --font-serif: 'Playfair Display', serif;
  --font-body: 'Inter', sans-serif;
  --shadow-sm: 0 1px 3px rgba(26,31,43,0.08);
  --shadow-md: 0 4px 12px rgba(26,31,43,0.10);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
}

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
  line-height: 1.5;
}

/* ===== HEADER ===== */
.dh-header {
  background: var(--green);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(27,67,50,0.25);
}
.dh-header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 2rem;
  height: 64px;
}
.dh-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}
.dh-logo-chip {
  width: 36px; height: 36px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.dh-logo-chip img { width: 22px; height: 22px; object-fit: contain; }
.dh-logo-text {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.05rem;
  color: #FFFFFF;
  letter-spacing: -0.01em;
}
.dh-logo-sub {
  font-size: 10px;
  color: rgba(255,255,255,0.6);
  font-weight: 400;
  display: block;
  line-height: 1;
  margin-top: 1px;
  letter-spacing: 0.02em;
}
.dh-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
}
.dh-nav-link {
  font-size: 13px;
  font-weight: 500;
  padding: 6px 16px;
  border-radius: 6px;
  text-decoration: none;
  color: rgba(255,255,255,0.75);
  transition: all 0.18s;
  white-space: nowrap;
}
.dh-nav-link:hover { color: #FFFFFF; background: rgba(255,255,255,0.10); }
.dh-nav-link.active { color: #FFFFFF; background: rgba(255,255,255,0.15); font-weight: 600; }
.dh-nav-link.active-gold { color: var(--gold-light); background: rgba(201,168,76,0.18); font-weight: 600; }
.dh-header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.dh-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--gold-light);
  background: rgba(201,168,76,0.18);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 20px;
  padding: 4px 12px;
  white-space: nowrap;
}

/* ===== CARDS ===== */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  box-shadow: var(--shadow-sm);
}
.card-title {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-mid);
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
}

/* ===== SECTION LABELS ===== */
.section-label {
  font-family: var(--font-display);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}

/* ===== BUTTONS ===== */
.btn-primary {
  background: var(--green);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius-sm);
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.18s;
}
.btn-primary:hover { background: var(--green-mid); }
.btn-outline {
  background: transparent;
  color: var(--green);
  border: 1px solid var(--border-green);
  border-radius: var(--radius-sm);
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
}
.btn-outline:hover { background: var(--green-pale); }
.btn-outline.active { background: var(--green-pale); border-color: var(--green-mid); color: var(--green); }

/* ===== TABS ===== */
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--cream-dark);
  padding: 4px;
  border-radius: 10px;
  border: 1px solid var(--border);
  width: fit-content;
}
.tab-btn {
  font-size: 13px;
  font-weight: 500;
  padding: 7px 18px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--ink-mid);
  cursor: pointer;
  transition: all 0.18s;
}
.tab-btn.active { background: var(--white); color: var(--ink); box-shadow: var(--shadow-sm); font-weight: 600; }
.tab-btn:hover:not(.active) { color: var(--ink); }

/* ===== GOLD ACCENT ELEMENTS ===== */
.gold-chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--green);
  background: var(--gold-pale);
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 20px;
  padding: 3px 10px;
}
.green-chip {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--green);
  background: var(--green-pale);
  border: 1px solid var(--border-green);
  border-radius: 20px;
  padding: 3px 10px;
}

/* ===== INSIGHT/SYLLABUS BOXES ===== */
.syllabus-box {
  background: var(--gold-pale);
  border: 1px solid rgba(201,168,76,0.35);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius-md);
  padding: 1rem 1.25rem;
}
.syllabus-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 5px;
}
.syllabus-text { font-size: 13px; color: var(--ink-mid); line-height: 1.65; }

.insight-box {
  background: var(--green-pale);
  border: 1px solid var(--border-green);
  border-left: 3px solid var(--green-mid);
  border-radius: var(--radius-md);
  padding: 1rem 1.25rem;
}
.insight-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--green-mid);
  margin-bottom: 5px;
}
.insight-text { font-size: 13px; color: var(--ink-mid); line-height: 1.65; }

/* ===== MARKET STRUCTURES PAGE LAYOUT ===== */
.main { max-width: 1200px; margin: 0 auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }

.intro { max-width: 700px; }
.intro h1 { font-family: var(--font-display); font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; color: var(--ink); }
.intro p { color: var(--ink-mid); font-size: 14px; line-height: 1.6; }

.structure-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.s-tab {
  font-family: var(--font-display);
  font-size: 13px; font-weight: 600;
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--white);
  color: var(--ink-mid);
  cursor: pointer;
  transition: all 0.18s;
}
.s-tab.active { border-color: var(--s-color); color: var(--s-color); background: color-mix(in srgb, var(--s-color) 12%, transparent); }
.s-tab:hover:not(.active) { color: var(--ink); }

.detail-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 3px solid var(--s-color);
  border-radius: 16px;
  padding: 2rem;
  display: grid;
  grid-template-columns: 1.2fr 1fr;
  gap: 2rem;
  box-shadow: var(--shadow-sm);
}
.detail-left h2 { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--s-color); }
.detail-left .tagline { color: var(--ink-mid); font-size: 13px; margin-bottom: 1.25rem; }
.example-chip { display: inline-block; font-size: 11px; font-weight: 500; background: var(--cream-dark); color: var(--ink-mid); padding: 4px 12px; border-radius: 20px; margin: 0 6px 6px 0; }
.feature-list { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 10px; }
.feature-row { display: flex; gap: 10px; font-size: 13px; line-height: 1.6; }
.feature-icon { color: var(--s-color); flex-shrink: 0; }
.feature-text { color: var(--ink-mid); }
.feature-text b { color: var(--ink); font-weight: 600; }

.stat-mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
.stat-mini { background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 0.85rem 1rem; }
.stat-mini-label { font-size: 10px; color: var(--ink-mid); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stat-mini-bar { height: 6px; background: var(--cream-mid); border-radius: 4px; overflow: hidden; margin-top: 6px; }
.stat-mini-fill { height: 100%; background: var(--s-color); border-radius: 4px; transition: width 0.3s; }
.stat-mini-value { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--ink); }

.compare-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.compare-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; box-shadow: var(--shadow-sm); }
.compare-card-title { font-family: var(--font-display); font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.compare-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-top: 1px solid var(--border); color: var(--ink-mid); }
.compare-row:first-of-type { border-top: none; }
.compare-row span:last-child { color: var(--ink); font-weight: 500; }

/* ===== RESPONSIVE ===== */
@media (max-width: 800px) {
  .dh-header-inner { padding: 0 1rem; gap: 1rem; }
  .dh-nav { gap: 1px; }
  .dh-nav-link { padding: 5px 10px; font-size: 12px; }
  .dh-logo-sub { display: none; }
  .detail-card { grid-template-columns: 1fr; }
  .compare-grid { grid-template-columns: 1fr 1fr; }
}

</style>
</head>
<body>

<header class="dh-header">
  <div class="dh-header-inner">
    <a href="../index.html" class="dh-logo">
      <div class="dh-logo-chip">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0.75" y="0.75" width="20.5" height="20.5" rx="5.25" stroke="#FFFFFF" stroke-width="1.2"/>
          <text x="11" y="15.5" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="12" fill="#FFFFFF">D</text>
        </svg>
      </div>
      <div>
        <span class="dh-logo-text">DH Lab</span>
        <span class="dh-logo-sub">Downe House School</span>
      </div>
    </a>
    <nav class="dh-nav">
      <a href="../index.html" class="dh-nav-link">Home</a>
      <a href="index.html" class="dh-nav-link">Economics</a>
      <a href="../history/timeline.html" class="dh-nav-link">History</a>
      <a href="../geography/index.html" class="dh-nav-link">Geography</a>
    </nav>
    <div class="dh-header-right">
      <span class="dh-badge">Market Structures</span>
    </div>
  </div>
</header>

<main class="main">
  <div class="intro">
    <h1>Market structures explorer</h1>
    <p>Compare how the number of sellers in a market changes pricing power, profit, and efficiency. Click a structure below to see its features in detail.</p>
  </div>

  <div class="structure-tabs" id="tabs"></div>

  <div class="detail-card" id="detail-card" style="--s-color:#2D6A4F;"></div>

  <div>
    <p class="section-label">Quick comparison</p>
    <div class="compare-grid" id="compare-grid"></div>
  </div>
</main>

<script>
const structures = {
  perfect: {
    color: '#2D6A4F',
    name: 'Perfect competition',
    tagline: 'Many small sellers, identical products, no single seller can influence price.',
    examples: ['Wheat farming', 'Foreign exchange', 'Fresh produce markets'],
    features: [
      ['Number of sellers', 'Very many — no single firm matters'],
      ['Product type', 'Identical (homogeneous)'],
      ['Pricing power', 'None — firms are "price takers"'],
      ['Barriers to entry', 'Very low — anyone can join'],
      ['Long-run profit', 'Zero economic profit — competition erodes it away']
    ],
    stats: { power: 5, barriers: 5, efficiency: 95, profit: 15 }
  },
  monopolistic: {
    color: '#F5A623',
    name: 'Monopolistic competition',
    tagline: 'Many sellers, but each offers a slightly different product — branding matters.',
    examples: ['Restaurants', 'Clothing brands', 'Hairdressers'],
    features: [
      ['Number of sellers', 'Many, but each has a niche'],
      ['Product type', 'Differentiated — branding, quality, location'],
      ['Pricing power', 'Some — based on brand loyalty'],
      ['Barriers to entry', 'Low to moderate'],
      ['Long-run profit', 'Small profit, kept low by new entrants copying success']
    ],
    stats: { power: 30, barriers: 30, efficiency: 70, profit: 35 }
  },
  oligopoly: {
    color: '#9D7BFF',
    name: 'Oligopoly',
    tagline: 'A handful of large firms dominate, and each watches the others closely.',
    examples: ['Supermarkets', 'Airlines', 'Mobile network providers'],
    features: [
      ['Number of sellers', 'Few — a small handful of large firms'],
      ['Product type', 'Can be similar or differentiated'],
      ['Pricing power', 'Significant — firms react to rivals\' moves'],
      ['Barriers to entry', 'High — large capital costs to compete'],
      ['Long-run profit', 'Can be substantial, especially if firms avoid price wars']
    ],
    stats: { power: 70, barriers: 75, efficiency: 50, profit: 65 }
  },
  monopoly: {
    color: '#FF6B6B',
    name: 'Monopoly',
    tagline: 'A single seller controls the entire market with no close substitutes.',
    examples: ['Local water utility', 'Patent-protected drugs', 'Rail network operator'],
    features: [
      ['Number of sellers', 'One — the sole supplier'],
      ['Product type', 'Unique, no close substitute'],
      ['Pricing power', 'Very high — firm is a "price maker"'],
      ['Barriers to entry', 'Very high — legal, technical, or cost barriers'],
      ['Long-run profit', 'Can be very high and persist over time']
    ],
    stats: { power: 95, barriers: 95, efficiency: 25, profit: 90 }
  }
};

let current = 'perfect';

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = Object.entries(structures).map(([key, s]) =>
    `<button class="s-tab ${key === current ? 'active' : ''}" style="--s-color:${s.color}" onclick="selectStructure('${key}')">${s.name}</button>`
  ).join('');
}

function selectStructure(key) {
  current = key;
  renderTabs();
  renderDetail();
}

function renderDetail() {
  const s = structures[current];
  const card = document.getElementById('detail-card');
  card.style.setProperty('--s-color', s.color);
  card.innerHTML = `
    <div class="detail-left">
      <h2>${s.name}</h2>
      <p class="tagline">${s.tagline}</p>
      <div>${s.examples.map(e => `<span class="example-chip">${e}</span>`).join('')}</div>
      <div class="feature-list">
        ${s.features.map(([label, val]) => `
          <div class="feature-row">
            <span class="feature-icon">●</span>
            <span class="feature-text"><b>${label}:</b> ${val}</span>
          </div>
        `).join('')}
      </div>
    </div>
    <div class="stat-mini-grid">
      <div class="stat-mini">
        <div class="stat-mini-label">Pricing power</div>
        <div class="stat-mini-value">${s.stats.power}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.power}%"></div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Entry barriers</div>
        <div class="stat-mini-value">${s.stats.barriers}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.barriers}%"></div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Market efficiency</div>
        <div class="stat-mini-value">${s.stats.efficiency}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.efficiency}%"></div></div>
      </div>
      <div class="stat-mini">
        <div class="stat-mini-label">Long-run profit potential</div>
        <div class="stat-mini-value">${s.stats.profit}%</div>
        <div class="stat-mini-bar"><div class="stat-mini-fill" style="width:${s.stats.profit}%"></div></div>
      </div>
    </div>
  `;
}

function renderCompareGrid() {
  const grid = document.getElementById('compare-grid');
  grid.innerHTML = Object.entries(structures).map(([key, s]) => `
    <div class="compare-card" style="border-top: 3px solid ${s.color};">
      <div class="compare-card-title" style="color:${s.color}">${s.name}</div>
      <div class="compare-row"><span>Sellers</span><span>${s.features[0][1].split(' —')[0]}</span></div>
      <div class="compare-row"><span>Pricing power</span><span>${s.stats.power}%</span></div>
      <div class="compare-row"><span>Entry barriers</span><span>${s.stats.barriers}%</span></div>
      <div class="compare-row"><span>Efficiency</span><span>${s.stats.efficiency}%</span></div>
    </div>
  `).join('');
}

renderTabs();
renderDetail();
renderCompareGrid();
</script>
<script>
// Theme toggle — persists per-tab in memory (standalone files on GitHub Pages can use localStorage safely)
function initTheme() {
  const s = localStorage.getItem('dhlab-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', s);
  updateToggle(s);
}
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('dhlab-theme', next);
  updateToggle(next);
  window.dispatchEvent(new CustomEvent('themechange', { detail: next }));
}
function updateToggle(t) {
  const btn = document.getElementById('theme-toggle-btn');
  const lbl = document.getElementById('toggle-label');
  const icon = btn ? btn.querySelector('.toggle-icon') : null;
  if (icon) icon.textContent = t === 'dark' ? '🌙' : '☀️';
  if (lbl) lbl.textContent = t === 'dark' ? 'Dark' : 'Light';
}
initTheme();
</script>

</body>
</html>
