<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Timeline Explorer — DH Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0D1117; --bg-card: #161B22; --bg-mid: #1C2128;
  --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.15); --gold-bright: #E6C96A;
  --white: #F0EDE8; --muted: rgba(240,237,232,0.52); --border: rgba(240,237,232,0.08);
  --font-display: 'Space Grotesk', sans-serif;
  --font-serif: 'Playfair Display', serif;
  --font-body: 'Inter', sans-serif;
}
[data-theme="light"] {
  --bg: #F7F5F0; --bg-card: #FFFFFF; --bg-mid: #F0EDE8;
  --gold: #8B6914; --gold-dim: rgba(139,105,20,0.10); --gold-bright: #6B4F0E;
  --white: #1A1F2B; --muted: rgba(26,31,43,0.55); --border: rgba(26,31,43,0.10);
}
body { background: var(--bg); color: var(--white); font-family: var(--font-body); min-height: 100vh; transition: background 0.25s, color 0.25s; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem; border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: color-mix(in srgb, var(--bg) 92%, transparent);
  backdrop-filter: blur(12px); z-index: 100; gap: 1rem; flex-wrap: wrap;
}
.logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--white); font-family: var(--font-display); font-weight: 700; font-size: 1rem; }
.dh-chip { width: 28px; height: 28px; background: #1B2A4A; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.dh-chip img { width: 17px; height: 17px; object-fit: contain; }
.site-nav { display: flex; gap: 4px; background: var(--bg-card); padding: 4px; border-radius: 10px; border: 1px solid var(--border); flex-wrap: wrap; }
.nav-link { font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 7px; text-decoration: none; color: var(--muted); transition: all 0.18s; white-space: nowrap; }
.nav-link.active { background: var(--bg-mid); color: var(--white); }
.nav-link:hover:not(.active) { color: var(--white); }
.header-right { display: flex; align-items: center; gap: 8px; }
.badge { font-size: 11px; font-weight: 500; background: var(--gold-dim); color: var(--gold-bright); border: 1px solid color-mix(in srgb, var(--gold) 30%, transparent); border-radius: 20px; padding: 4px 12px; }
.theme-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: border-color 0.18s; }
.theme-btn:hover { border-color: var(--gold); }

/* YEAR SELECTOR */
.year-hero {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 2.5rem 2rem;
  text-align: center;
}
.year-label { font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold-bright); margin-bottom: 1rem; }
.year-display {
  font-family: var(--font-serif);
  font-size: clamp(3rem, 10vw, 6rem);
  font-weight: 700;
  color: var(--white);
  line-height: 1;
  margin-bottom: 0.5rem;
  cursor: pointer;
  display: inline-block;
}
.year-era { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
.year-slider-wrap { max-width: 700px; margin: 0 auto; }
.year-slider {
  -webkit-appearance: none; width: 100%; height: 3px;
  background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--pct, 70%), var(--border) var(--pct, 70%));
  border-radius: 4px; outline: none; cursor: pointer;
}
.year-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px;
  background: var(--gold); border-radius: 50%;
  box-shadow: 0 0 0 4px var(--gold-dim);
}
.era-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; color: var(--muted); }
.quick-years { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 1.25rem; }
.quick-yr {
  font-size: 12px; font-weight: 500; padding: 5px 12px;
  border: 1px solid var(--border); border-radius: 20px;
  background: transparent; color: var(--muted); cursor: pointer;
  transition: all 0.18s;
}
.quick-yr:hover { border-color: var(--gold); color: var(--gold-bright); }
.quick-yr.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-bright); }

/* CONTENT */
.content { max-width: 1200px; margin: 0 auto; padding: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }

.section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; }
.section-card.full { grid-column: 1 / -1; }
.section-title {
  font-family: var(--font-display); font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.section-title-icon { font-size: 14px; }

/* LEADERS */
.leaders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.leader-card {
  background: var(--bg-mid); border-radius: 10px; padding: 12px;
  border-left: 2px solid var(--s-color, var(--border));
}
.leader-country { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.leader-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
.leader-title { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* EVENTS */
.events-list { display: flex; flex-direction: column; gap: 10px; }
.event-item { display: flex; gap: 12px; align-items: flex-start; }
.event-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 5px; }
.event-body { flex: 1; }
.event-title { font-size: 13px; font-weight: 600; line-height: 1.4; }
.event-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
.event-tag { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; display: inline-block; margin-top: 4px; }

/* CONTEXT */
.context-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.context-item { background: var(--bg-mid); border-radius: 10px; padding: 12px; }
.context-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.context-value { font-family: var(--font-display); font-size: 15px; font-weight: 600; }

/* LOADING */
.loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 14px; }
.loading-spinner { font-size: 2rem; display: block; margin-bottom: 1rem; animation: spin 1.5s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .content { grid-template-columns: 1fr; }
  .section-card.full { grid-column: 1; }
  .context-grid { grid-template-columns: 1fr 1fr; }
  .leaders-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

<script>
let currentYear = 1944;
let debounceTimer = null;

// Embed logo
(function() {
  const img = document.getElementById('dh-logo');
  img.onerror = () => {
    img.parentElement.innerHTML = '<span style="font-family:Space Grotesk,sans-serif;font-weight:700;font-size:11px;color:#C9A84C;">DH</span>';
  };
})();

function getEra(y) {
  if (y < 1815) return 'Early 19th Century · Napoleonic era';
  if (y < 1848) return 'Early 19th Century · Post-Napoleonic Europe';
  if (y < 1870) return 'Mid-19th Century · Age of Revolution & Nationalism';
  if (y < 1900) return 'Late 19th Century · Age of Imperialism';
  if (y < 1914) return 'Early 20th Century · Belle Époque';
  if (y < 1918) return 'Early 20th Century · First World War';
  if (y < 1929) return 'Inter-war period · 1920s';
  if (y < 1939) return 'Inter-war period · Great Depression era';
  if (y < 1945) return 'Mid-20th Century · Second World War era';
  if (y < 1953) return 'Post-war · Early Cold War';
  if (y < 1968) return 'Cold War · Post-war settlement';
  if (y < 1980) return 'Cold War · Era of détente';
  if (y < 1991) return 'Late Cold War';
  if (y < 2001) return 'Post-Cold War · 1990s';
  if (y < 2008) return '21st Century · War on Terror era';
  if (y < 2016) return '21st Century · Post-financial crisis';
  return '21st Century · Contemporary';
}

function updateSliderGradient(val) {
  const min = 1800, max = 2024;
  const pct = ((val - min) / (max - min)) * 100;
  document.getElementById('year-slider').style.setProperty('--pct', pct + '%');
}

function setYear(y) {
  currentYear = y;
  document.getElementById('year-slider').value = y;
  document.getElementById('year-display').textContent = y;
  document.getElementById('year-era').textContent = getEra(y);
  updateSliderGradient(y);
  document.querySelectorAll('.quick-yr').forEach(b => {
    b.classList.toggle('active', +b.textContent === y);
  });
  loadYear(y);
}

function onYearChange(val) {
  currentYear = +val;
  document.getElementById('year-display').textContent = val;
  document.getElementById('year-era').textContent = getEra(+val);
  updateSliderGradient(+val);
  document.querySelectorAll('.quick-yr').forEach(b => b.classList.remove('active'));
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => loadYear(+val), 600);
}

async function loadYear(year) {
  document.getElementById('content-area').innerHTML = `
    <div class="loading" style="grid-column:1/-1">
      <span class="loading-spinner">⏳</span>
      Loading ${year}...
    </div>`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: `You are a history education tool for Sixth Form students at Downe House school. 
Return ONLY valid JSON, no markdown, no explanation. 
For any given year, return historical data in this exact structure:
{
  "leaders": [
    {"country": "United Kingdom", "name": "Person Name", "title": "Prime Minister", "color": "#hex"},
    {"country": "United States", "name": "Person Name", "title": "President", "color": "#hex"},
    {"country": "France", "name": "Person Name", "title": "Title", "color": "#hex"},
    {"country": "Germany", "name": "Person Name", "title": "Title", "color": "#hex"},
    {"country": "Russia/USSR", "name": "Person Name", "title": "Title", "color": "#hex"},
    {"country": "China", "name": "Person Name", "title": "Title", "color": "#hex"}
  ],
  "events": [
    {"title": "Event name", "desc": "1-2 sentence description for Sixth Form students", "tag": "Politics|War|Economics|Science|Culture", "tagColor": "#hex"},
    {"title": "Event name", "desc": "1-2 sentence description", "tag": "Tag", "tagColor": "#hex"},
    {"title": "Event name", "desc": "1-2 sentence description", "tag": "Tag", "tagColor": "#hex"},
    {"title": "Event name", "desc": "1-2 sentence description", "tag": "Tag", "tagColor": "#hex"},
    {"title": "Event name", "desc": "1-2 sentence description", "tag": "Tag", "tagColor": "#hex"}
  ],
  "context": {
    "population": "World population figure e.g. 2.3 billion",
    "technology": "Most significant technology of this era in 5 words",
    "britain": "What Britain was doing/experiencing in 8 words"
  },
  "snapshot": "A vivid 2-sentence summary of what the world felt like in this year, written for a Sixth Form student."
}
Use historically accurate data. For color fields use tasteful hex colors that reflect the nature of the item (e.g. red for war/conflict, blue for politics, green for economics, purple for science).`,
        messages: [{ role: 'user', content: `Give me the historical data for the year ${year}.` }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const hist = JSON.parse(clean);
    renderYear(year, hist);
  } catch (e) {
    console.error(e);
    document.getElementById('content-area').innerHTML = `
      <div class="loading" style="grid-column:1/-1">
        <span>⚠️</span><br>
        Couldn't load data for ${year}. Try another year or check your connection.
      </div>`;
  }
}

function renderYear(year, hist) {
  const leadersHtml = hist.leaders.map(l => `
    <div class="leader-card" style="--s-color:${l.color}">
      <div class="leader-country">${l.country}</div>
      <div class="leader-name">${l.name}</div>
      <div class="leader-title">${l.title}</div>
    </div>`).join('');

  const eventsHtml = hist.events.map(e => `
    <div class="event-item">
      <div class="event-dot" style="background:${e.tagColor}"></div>
      <div class="event-body">
        <div class="event-title">${e.title}</div>
        <div class="event-desc">${e.desc}</div>
        <span class="event-tag" style="background:${e.tagColor}20;color:${e.tagColor}">${e.tag}</span>
      </div>
    </div>`).join('');

  document.getElementById('content-area').innerHTML = `
    <div class="section-card full">
      <div class="section-title"><span class="section-title-icon">🌍</span>The world in ${year}</div>
      <p style="font-size:14px;color:var(--muted);line-height:1.7;">${hist.snapshot}</p>
    </div>

    <div class="section-card">
      <div class="section-title"><span class="section-title-icon">👑</span>World leaders</div>
      <div class="leaders-grid">${leadersHtml}</div>
    </div>

    <div class="section-card">
      <div class="section-title"><span class="section-title-icon">📅</span>Key events of ${year}</div>
      <div class="events-list">${eventsHtml}</div>
    </div>

    <div class="section-card full">
      <div class="section-title"><span class="section-title-icon">📊</span>Context</div>
      <div class="context-grid">
        <div class="context-item">
          <div class="context-label">World population</div>
          <div class="context-value">${hist.context.population}</div>
        </div>
        <div class="context-item">
          <div class="context-label">Defining technology</div>
          <div class="context-value">${hist.context.technology}</div>
        </div>
        <div class="context-item">
          <div class="context-label">Britain in ${year}</div>
          <div class="context-value" style="font-size:13px;font-weight:500;">${hist.context.britain}</div>
        </div>
      </div>
    </div>`;
}

function initTheme() {
  const saved = localStorage.getItem('dhlab-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateIcon(saved);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('dhlab-theme', next);
  updateIcon(next);
}
function updateIcon(t) {
  const b = document.getElementById('theme-toggle-btn');
  if (b) b.textContent = t === 'dark' ? '☀️' : '🌙';
}

// Embed DH logo
(function embedLogo() {
  const img = document.getElementById('dh-logo');
  if (!img) return;
  img.onerror = () => {
    img.parentElement.innerHTML = '<span style="font-family:Space Grotesk,sans-serif;font-weight:700;font-size:11px;color:#C9A84C;">DH</span>';
  };
})();

initTheme();
updateSliderGradient(1944);
loadYear(1944);
</script>
